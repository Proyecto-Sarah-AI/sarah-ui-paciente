server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the app under /paciente/
    location /paciente/ {
        try_files $uri $uri/ /paciente/index.html;
    }

    # Redirect root to the subpath (optional)
    location = / {
        return 302 /paciente/;
    }
}