services:
  paciente:
    image: node:20-alpine
    container_name: sarah-ui-paciente
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    expose:
      - "5173"
    networks:
      - sarah-network
    restart: unless-stopped

networks:
  sarah-network:
    external: true